<!doctype html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auszeit mit Klang | Mag. Barbara Schlosser</title>
    <meta name="description" content="" />
    <link rel="stylesheet" href="./assets/style.css" />
    <script src="./assets/tailwind.3.4.17.js"></script>
</head>

<body class="antialiased min-h-screen">
    <div class="w-full h-[25vh] md:h-[30vh] lg:h-[35vh] relative">
        <div class="w-full h-full absolute top-0 left-0 background"></div>
        <div class="w-full h-full absolute top-0 left-0 golden"></div>
        <div class="h-full p-10 flex flex-col justify-center">
            <img class="block max-h-full h-auto w-auto mx-auto logo" src="./assets/img/LOGO_Auszeit_mit_Klang_4c_WEB.png" alt="Logo">
        </div>
    </div>
    <main class="w-full text-white">
        <section class="relative">
            <svg class="absolute top-1 left-0 w-full -translate-y-full" height="20" preserveAspectRatio="none"
                viewBox="0 0 1000 20">
                <path d="M0,10 C250,-5 750,25 1000,10 L1000,20 L0,20 Z" fill="#7b003d" />
            </svg>
            <div class="flex flex-col shrink py-14 px-8 max-w-4xl mx-auto justify-center items-center">
                <h2 class="text-center">
                    <span>Klangreisen</span>
                    <span>Klangbehandlungen</span>
                    <span>Klang-Workshops & Retreats</span>
                </h2>
                <div class="">
                    <img class="h-[25px] my-4" src="./assets/img/LOGO_Auszeit_mit_Klang_klangschale_weiss_WEB.png" alt="Schale">
                </div>
                <div class="text-center">
                    <p class="italic">
                        „Ich biete vielbeschäftigten Frauen<br />
                        eine Auszeit und begleite sie<br />
                        weg von Gedankenkreisen<br />
                        hin zu innerer Ruhe –<br />
                        zrück in die eigene Kraft“
                    </p>
                </div>
            </div>
            <svg class="absolute bottom-1 left-0 w-full translate-y-full" height="20" preserveAspectRatio="none"
                viewBox="0 0 1000 20">
                <path d="M0,10 C250,25 750,-5 1000,10 L1000,0 L0,0 Z" fill="#7b003d" />
            </svg>
        </section>
        <div class="max-w-lg mx-auto text-black my-8 gap-6">
            <div class="grid grid-cols-12 text-right">
                <div class="col-span-6">
                    Foto
                </div>
                <div class="col-span-6">
                    Mag. Barbara Schlosser
                </div>
            </div>
        </div>
    </main>
</body>
</html>
